<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GrowSphere | Home</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

</head>
<body>

<header class="top-nav">
  <div class="logo">🌱 GrowSphere</div>
<nav class="nav-links">
  <a href="dashboard.html">Dashboard</a>
  <a href="learn.html">Learn</a>
  <a href="planner.html">Planner</a>
  <a href="progress.html">Progress</a>
  <a href="Body & Brain.html">Relax</a>
  <a href="resume.html">Resume</a>
  <a href="settings.html">Settings</a>
</nav>


</header>


  <main>
    <!-- Mood Picker -->
    <section id="mood-picker">
      <h2>🧠 How are you feeling today?</h2>
      <div class="emojis">
        <span>😊</span>
        <span>😐</span>
        <span>😟</span>
        <span>😍</span>
      </div>
    </section>

    <!-- Micro Goal Input -->
    <section id="micro-goal">
      <h2>📝 Today’s Micro Goal</h2>
      <input type="text" placeholder="E.g., Finish 2 pages of Physics" />
    </section>

    <!-- Bloom of the Day -->
    <section id="bloom">
      <h2>🌸 Bloom of the Day</h2>
      <textarea rows="3" placeholder="What did you learn today?"></textarea>
    </section>

    <!-- Quick Stats -->
    <section id="stats">
      <h2>📅 Quick Glance</h2>
      <p>Next Exam: <strong>DBMS – 5 days left</strong></p>
      <p>🔥 Study Streak: <strong>4 Days</strong></p>
    </section>

    <!-- Motivational Quote -->
    <section id="quote">
      <h2>💬 Quote of the Day</h2>
      <blockquote>
        “Learning is a journey, not a race.” ✨
      </blockquote>
    </section>
  </main>

<footer class="bottom-footer">
  <p>&copy; 2025 GrowSphere</p>
</footer>


  <script src="js/main.js"></script>
</body>
</html>
